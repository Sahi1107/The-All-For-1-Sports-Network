<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AllFor1" />
    <link rel="manifest" href="/manifest.json" />
    <title>All For 1</title>

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://allfor1.pro/" />
    <meta property="og:title" content="All For 1" />
    <meta property="og:description" content="The network for athletes, coaches & scouts." />
    <meta property="og:image" content="https://allfor1.pro/favicon.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="All For 1" />
    <meta name="twitter:description" content="The network for athletes, coaches & scouts." />

    <style>
      html, body { margin: 0; padding: 0; background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      #root:empty::before {
        content: "";
        position: fixed; inset: 0;
        display: block;
        background: #0a0a0a;
      }
      #root:empty::after {
        content: "";
        position: fixed; top: 50%; left: 50%;
        width: 32px; height: 32px;
        margin: -16px 0 0 -16px;
        border: 2px solid #3b82f6;
        border-top-color: transparent;
        border-radius: 50%;
        animation: af1-spin 0.8s linear infinite;
      }
      @keyframes af1-spin { to { transform: rotate(360deg); } }
      #af1-nojs { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 24px; text-align: center; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div id="af1-nojs">
        <div>
          <h1 style="font-size:20px;margin:0 0 8px;">All For 1</h1>
          <p style="opacity:.7;margin:0;">JavaScript is required. Open this link in your default browser (Safari or Chrome).</p>
        </div>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
